name: Android CI/CD

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build UniApp H5
      run: npm run build:h5

    - name: Export UniApp Android resources
      run: |
        echo "🚀 Starting Android export..."
        # 使用 uni-app CLI 导出 Android 资源
        npx uni build -p app-android --release

    - name: Build APK with Gradle
      uses: 0n1z3r0n5/gradle-android-apk-builder@v1.0.0
      with:
        directory: unpackage/release
        keystore-content: ${{ secrets.ANDROID_KEYSTORE }}
        keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
        key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}
        output-path: app-release.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: app-release.apk
        retention-days: 30
